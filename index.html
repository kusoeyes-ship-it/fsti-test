let currentQ = 0;
let answers = [];

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function calcScores() {
  const s = {};
  answers.forEach((ans, qi) => {
    if (ans >= 0 && questions[qi]) {
      const opt = questions[qi].opts[ans];
      for (let k in opt.scores) { s[k] = (s[k] || 0) + opt.scores[k]; }
    }
  });
  return s;
}

function startTest() {
  currentQ = 0;
  answers = new Array(questions.length).fill(-1);
  showPage('page-test');
  renderQuestion();
}

  const q = questions[currentQ];
  const area = document.getElementById('question-area');
  document.getElementById('progress').style.width = ((currentQ+1)/questions.length*100)+'%';
  document.getElementById('progress-text').textContent = `${currentQ+1} / ${questions.length}`;
  const prev = answers[currentQ];
  let html = `<div class="question-card"><div class="question-text">${q.q}</div>`;
  q.opts.forEach((o,i) => {
    html += `<button class="option${i===prev?' selected':''}" data-idx="${i}">${o.text}</button>`;
  });
  html += `<div class="nav-row"><button class="prev-btn" id="btn-prev" ${currentQ===0?'disabled':''}>⬅ 上一题</button><span class="nav-hint">点选项前进 · 可回退修改</span></div></div>`;
  area.innerHTML = html;
  area.querySelectorAll('.option').forEach(b => {
    b.addEventListener('click', function(){ selectOption(parseInt(this.dataset.idx)); });
  });
  const pb = document.getElementById('btn-prev');
  if(pb && currentQ>0) pb.addEventListener('click', goPrev);
}

function selectOption(idx) {
  answers[currentQ] = idx;
  currentQ++;
  if(currentQ < questions.length) renderQuestion(); else showResult();
}

function goPrev() { if(currentQ>0){ currentQ--; renderQuestion(); } }

function showResult() {
  const scores = calcScores();
  let best = null, bestS = -1;
  results.forEach(r => {
    let s=0, m=0;
    for(let k in r.dims){ s += (scores[k]||0)*(r.dims[k]/100); m += 20*(r.dims[k]/100); }
    const pct = Math.min(99, Math.round(55+(s/Math.max(m,1))*44));
    if(s > bestS){ bestS=s; best={...r, matchPct:pct}; }
  });
  const r = best;
  const dn = {
    krypton:'氪金力', data:'数据力', face:'颜控度', mom:'妈粉值', gf:'恋爱脑',
    toxic:'毒唯度', buddha:'佛系度', climb:'爬墙率', shill:'安利欲', antihate:'反黑力',
    ctrl:'控评力', front:'前线力', drama:'戏精值', emo:'emo值', sane:'理智值',
    loyal:'忠诚度'
  };
  const dc = {
    krypton:'#ffd93d', data:'#38bdf8', face:'#ff6bcd', mom:'#6bcb77', gf:'#ff6b6b',
    toxic:'#9333ea', buddha:'#94a3b8', climb:'#f97316', shill:'#22d3ee', antihate:'#ef4444',
    ctrl:'#3b82f6', front:'#a855f7', drama:'#ec4899', emo:'#60a5fa', sane:'#10b981',
    loyal:'#f59e0b'
  };
  let dh = '';
  const dims = ['krypton','data','face','mom','gf','toxic','buddha','climb','shill','antihate','ctrl','front','drama','emo','sane','loyal'];
  dims.forEach(d => {
    if(!dn[d]) return;
    const v = Math.min(99, Math.max(5, Math.round((scores[d]||0)/20*100+Math.random()*12)));
    dh += `<div class="dim-row"><span class="dim-label">${dn[d]}</span><div class="dim-bar"><div class="dim-fill" style="width:${v}%;background:${dc[d]||'#a855f7'}"></div></div><span class="dim-val">${v}%</span></div>`;
  });

  document.getElementById('result-content').innerHTML = `
    <div class="result-card">
      <div class="result-emoji">${r.emoji}</div>
      <div class="result-code">${r.code}</div>
      <div class="result-name">${r.name}</div>
      <div class="result-match">灵魂匹配度 ${r.matchPct}% · 饭圈大数据玄学定位</div>
      <div class="result-tagline">${r.tagline}</div>
      <div class="result-desc">${r.desc}</div>
      <div class="dims-section">
        <h3>🎤 十六维追星人格落点</h3>
        ${dh}
      </div>
      <button class="retry-btn" id="btn-retry">🔄 不服再测一次</button>
      <button class="share-btn" id="btn-share">📤 分享给饭圈姐妹</button>
    </div>
    <div class="disclaimer" style="margin-top:20px;">
      ⚠️ <strong>温馨提示</strong>：本结果由饭圈玄学引擎v1.0生成。如果你觉得不准，说明你还没认清自己的追星本质。如果你觉得准，那恭喜你——<strong>你已经没救了，但饭圈欢迎你</strong>。
    </div>
    <div class="footer-note">
      FSTI · Fandom Soul Type Indicator · 追星灵魂人格指示器<br>
      灵感来源：SBTI测试 · 本测试纯属饭圈整活<br>
      仅供娱乐，请勿用于粉丝战争、超话举报或脱粉回踩<br>
      © 2026 FSTI · 你追的不是星，是你自己
    </div>
  `;
  showPage('page-result');
  document.getElementById('btn-retry').addEventListener('click', startTest);
  document.getElementById('btn-share').addEventListener('click', function(){
    alert('截图分享给你的饭圈姐妹/兄弟吧！看看他们是哪种追星怪物 🎤');
  });
}

document.getElementById('btn-start').addEventListener('click', startTest);
</script>
