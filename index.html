<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTI 追星灵魂人格测试 | 你是哪种追星怪物？</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #0a0015;
  color: #e0e0e0;
  min-height: 100vh;
  overflow-x: hidden;
}
.stars {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(ellipse at 30% 20%, #1a0a2e 0%, #0a0015 50%, #050010 100%);
  z-index: -1;
}
.star {
  position: absolute; border-radius: 50%; background: #fff;
  animation: twinkle 2s ease-in-out infinite alternate;
}
@keyframes twinkle { 0% { opacity: 0.15; } 100% { opacity: 0.9; } }
.container { max-width: 680px; margin: 0 auto; padding: 20px; }

/* 首页 */
.page { display: none; }
.page.active { display: block; }
.title-section { text-align: center; padding: 50px 0 25px; }
.title-section h1 {
  font-size: 48px; font-weight: 900;
  background: linear-gradient(135deg, #ff6bcd, #a855f7, #6366f1, #38bdf8, #ff6bcd);
  background-size: 200% 200%;
  animation: gradShift 4s ease infinite;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 8px;
}
@keyframes gradShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
.title-section .sub { color: #888; font-size: 14px; margin-bottom: 5px; }
.title-section .slogan {
  font-size: 16px; color: #a855f7; margin: 18px 0 8px;
  text-decoration: line-through; text-decoration-color: #555;
}
.title-section .real-slogan {
  font-size: 21px; color: #ff6bcd; font-weight: bold; line-height: 1.6;
}
.disclaimer {
  background: rgba(168,85,247,0.08); border: 1px solid rgba(168,85,247,0.25);
  border-radius: 12px; padding: 15px; margin: 20px 0; font-size: 13px; color: #c4a0e8;
  line-height: 1.8;
}
.start-btn {
  display: block; width: 80%; max-width: 320px; margin: 28px auto;
  padding: 16px; font-size: 18px; font-weight: bold;
  background: linear-gradient(135deg, #a855f7, #ff6bcd);
  color: #fff; border: none; border-radius: 50px;
  cursor: pointer; transition: all 0.3s;
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
}
.start-btn:hover { transform: scale(1.05); box-shadow: 0 0 35px rgba(168,85,247,0.5); }

/* 测试题 */
.progress-bar { height: 4px; background: #1a1a2e; border-radius: 2px; margin: 20px 0; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #a855f7, #ff6bcd); border-radius: 2px; transition: width 0.5s; }
.progress-text { text-align: center; color: #666; font-size: 13px; margin-bottom: 20px; }
.question-card {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(168,85,247,0.15);
  border-radius: 16px; padding: 28px; margin: 10px 0; animation: fadeIn 0.5s;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.question-text { font-size: 17px; font-weight: bold; margin-bottom: 22px; line-height: 1.7; color: #fff; }
.option {
  display: block; width: 100%; padding: 13px 16px; margin: 9px 0;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px; color: #ccc; font-size: 14.5px; text-align: left;
  cursor: pointer; transition: all 0.3s; line-height: 1.5;
}
.option:hover { background: rgba(168,85,247,0.15); border-color: #a855f7; color: #fff; transform: translateX(5px); }
.option.selected { background: rgba(168,85,247,0.22); border-color: #a855f7; color: #fff; }
.nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
.prev-btn {
  padding: 9px 24px; font-size: 13px; color: #888; background: transparent;
  border: 1px solid rgba(255,255,255,0.12); border-radius: 50px; cursor: pointer; transition: all 0.3s;
}
.prev-btn:hover { border-color: #a855f7; color: #a855f7; }
.prev-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.nav-hint { font-size: 12px; color: #555; }

/* 结果页 */
.result-card {
  text-align: center; padding: 35px 22px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(168,85,247,0.15);
  border-radius: 20px; margin: 20px 0;
}
.result-emoji { font-size: 72px; margin-bottom: 12px; }
.result-code { font-size: 32px; font-weight: 900; color: #a855f7; letter-spacing: 3px; }
.result-name { font-size: 22px; color: #ff6bcd; margin: 6px 0 4px; font-weight: bold; }
.result-match { font-size: 13px; color: #666; margin-bottom: 18px; }
.result-desc {
  font-size: 14.5px; line-height: 2; color: #bbb; text-align: left;
  padding: 18px; background: rgba(0,0,0,0.3); border-radius: 12px; margin: 14px 0;
}
.result-desc strong { color: #a855f7; }
.result-tagline { font-size: 19px; color: #fff; font-weight: bold; margin: 12px 0; font-style: italic; }
.dims-section { margin: 22px 0; text-align: left; }
.dims-section h3 { color: #a855f7; margin-bottom: 14px; font-size: 15px; }
.dim-row { display: flex; align-items: center; margin: 7px 0; font-size: 12px; }
.dim-label { width: 78px; color: #888; flex-shrink: 0; }
.dim-bar { flex: 1; height: 7px; background: #1a1a2e; border-radius: 4px; margin: 0 8px; }
.dim-fill { height: 100%; border-radius: 4px; transition: width 1s; }
.dim-val { width: 38px; text-align: right; color: #a855f7; flex-shrink: 0; }
.retry-btn {
  display: inline-block; padding: 13px 36px; margin: 18px 8px;
  background: transparent; border: 2px solid #a855f7; color: #a855f7;
  border-radius: 50px; font-size: 15px; cursor: pointer; transition: all 0.3s;
}
.retry-btn:hover { background: #a855f7; color: #fff; }
.share-btn {
  display: inline-block; padding: 13px 36px; margin: 18px 8px;
  background: linear-gradient(135deg, #ff6bcd, #a855f7); border: none; color: #fff;
  border-radius: 50px; font-size: 15px; cursor: pointer; transition: all 0.3s;
}
.share-btn:hover { transform: scale(1.05); }
.poster-btn {
  display: inline-block; padding: 13px 36px; margin: 18px 8px;
  background: linear-gradient(135deg, #6366f1, #38bdf8); border: none; color: #fff;
  border-radius: 50px; font-size: 15px; cursor: pointer; transition: all 0.3s;
}
.poster-btn:hover { transform: scale(1.05); }
.qr-section {
  margin: 25px auto; text-align: center; padding: 18px;
  background: rgba(255,255,255,0.06); border: 1px dashed rgba(168,85,247,0.3);
  border-radius: 16px; max-width: 280px;
}
.qr-section img { width: 140px; height: 140px; border-radius: 8px; margin-bottom: 8px; }
.qr-section p { font-size: 12px; color: #888; line-height: 1.6; }
.poster-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); z-index: 9999;
  justify-content: center; align-items: center; flex-direction: column;
}
.poster-overlay.show { display: flex; }
.poster-overlay canvas { border-radius: 12px; max-width: 90vw; max-height: 75vh; }
.poster-actions { margin-top: 16px; display: flex; gap: 12px; }
.poster-actions button {
  padding: 12px 30px; border-radius: 50px; font-size: 14px; cursor: pointer; transition: all 0.3s;
}
.poster-save { background: linear-gradient(135deg, #a855f7, #ff6bcd); border: none; color: #fff; }
.poster-close { background: transparent; border: 2px solid #666; color: #aaa; }
.poster-save:hover { transform: scale(1.05); }
.poster-close:hover { border-color: #fff; color: #fff; }
.footer-note { text-align: center; color: #444; font-size: 11px; margin: 28px 0; line-height: 1.8; }
.brand-logo { display: block; margin: 15px auto 5px; height: 28px; opacity: 0.6; }
.brand-text { text-align: center; color: #555; font-size: 11px; margin-bottom: 10px; }
</style>
</head>

// ========== 测试逻辑 ==========
let currentQ = 0;
let answers = [];

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function calcScores() {
  const s = {};
  answers.forEach((ans, qi) => {
    if (ans >= 0 && questions[qi]) {
      const opt = questions[qi].opts[ans];
      for (let k in opt.scores) { s[k] = (s[k] || 0) + opt.scores[k]; }
    }
  });
  return s;
}

function startTest() {
  currentQ = 0;
  answers = new Array(questions.length).fill(-1);
  showPage('page-test');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const area = document.getElementById('question-area');
  document.getElementById('progress').style.width = ((currentQ+1)/questions.length*100)+'%';
  document.getElementById('progress-text').textContent = `${currentQ+1} / ${questions.length}`;
  const prev = answers[currentQ];
  let html = `<div class="question-card"><div class="question-text">${q.q}</div>`;
  q.opts.forEach((o,i) => {
    html += `<button class="option${i===prev?' selected':''}" data-idx="${i}">${o.text}</button>`;
  });
  html += `<div class="nav-row"><button class="prev-btn" id="btn-prev" ${currentQ===0?'disabled':''}>⬅ 上一题</button><span class="nav-hint">点选项前进 · 可回退修改</span></div></div>`;
  area.innerHTML = html;
  area.querySelectorAll('.option').forEach(b => {
    b.addEventListener('click', function(){ selectOption(parseInt(this.dataset.idx)); });
  });
  const pb = document.getElementById('btn-prev');
  if(pb && currentQ>0) pb.addEventListener('click', goPrev);
}

function selectOption(idx) {
  answers[currentQ] = idx;
  currentQ++;
  if(currentQ < questions.length) renderQuestion(); else showResult();
}

function goPrev() { if(currentQ>0){ currentQ--; renderQuestion(); } }

function showResult() {
  const scores = calcScores();
  let best = null, bestS = -1;
  results.forEach(r => {
    let s=0, m=0;
    for(let k in r.dims){ s += (scores[k]||0)*(r.dims[k]/100); m += 20*(r.dims[k]/100); }
    const pct = Math.min(99, Math.round(55+(s/Math.max(m,1))*44));
    if(s > bestS){ bestS=s; best={...r, matchPct:pct}; }
  });
  const r = best;
  const dn = {
    krypton:'应援力', data:'数据力', face:'颜控度', mom:'妈粉值', gf:'恋爱脑',
    toxic:'专一度', chill:'淡定度', climb:'爬墙率', shill:'安利欲', antihate:'反黑力',

// ========== Canvas 海报生成 ==========
function generatePoster(r, scores, dimsHtml) {
  // 先预加载角色头像
  const avatarImg = new Image();
  avatarImg.src = AVATAR_MAP[r.code] || '';
  avatarImg.onload = function() { doDrawPoster(r, scores, avatarImg); };
  avatarImg.onerror = function() { doDrawPoster(r, scores, null); };
}

function doDrawPoster(r, scores, avatarImg) {
  const W = 750;
  const canvas = document.getElementById('poster-canvas');
  const ctx = canvas.getContext('2d');

  // 先用临时画布计算内容高度
  canvas.width = W; canvas.height = 2000;

  function drawContent() {
    // 背景渐变
    const bg = ctx.createLinearGradient(0, 0, W, canvas.height);
    bg.addColorStop(0, '#0a0015');
    bg.addColorStop(0.5, '#1a0a2e');
    bg.addColorStop(1, '#0a0015');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, canvas.height);

    // 星星装饰
    for(let i=0; i<60; i++){
      ctx.beginPath();
      ctx.arc(Math.random()*W, Math.random()*canvas.height, Math.random()*1.5+0.5, 0, Math.PI*2);
      ctx.fillStyle = `hsla(${260+Math.random()*60},80%,85%,${0.3+Math.random()*0.5})`;
      ctx.fill();
    }

    let y = 60;
    // 顶部标题
    ctx.textAlign = 'center';
    ctx.fillStyle = '#888';
    ctx.font = '24px -apple-system, PingFang SC, sans-serif';
    ctx.fillText('FSTI \u00b7 追星灵魂人格测试', W/2, y);
    y += 120;

    // 角色头像
    if (avatarImg) {
      const aSize = 140;
      ctx.save();
      ctx.beginPath();
      ctx.arc(W/2, y - aSize/2 + 70, aSize/2, 0, Math.PI*2);
      ctx.clip();
      ctx.drawImage(avatarImg, W/2 - aSize/2, y - aSize/2 + 70 - aSize/2, aSize, aSize);
      ctx.restore();
    } else {
      ctx.font = '100px serif';
      ctx.fillText(r.emoji, W/2, y);
    }
    y += 70;

    // 代号
    ctx.font = 'bold 48px -apple-system, PingFang SC, sans-serif';
    ctx.fillStyle = '#a855f7';
    ctx.fillText(r.code, W/2, y);
    y += 45;

    // 名称
    ctx.font = 'bold 36px -apple-system, PingFang SC, sans-serif';
    ctx.fillStyle = '#ff6bcd';
    ctx.fillText(r.name, W/2, y);
    y += 35;

    // 匹配度
    ctx.font = '20px -apple-system, PingFang SC, sans-serif';
    ctx.fillStyle = '#888';
    ctx.fillText('\u7075\u9b42\u5339\u914d\u5ea6 ' + r.matchPct + '%', W/2, y);
    y += 45;

    // tagline
    ctx.font = 'italic 24px -apple-system, PingFang SC, sans-serif';
    ctx.fillStyle = '#fff';
    y = wrapText(ctx, r.tagline.replace(/'/g, ''), W/2, y, W-100, 32);
    y += 25;

    // 描述
    const descClean = r.desc.replace(/<[^>]+>/g, '');
    ctx.font = '20px -apple-system, PingFang SC, sans-serif';
    ctx.fillStyle = '#bbb';
    ctx.textAlign = 'left';
    y = wrapText(ctx, descClean, 60, y, W-120, 30);
    y += 35;

    // 维度条标题
    ctx.font = 'bold 20px -apple-system, PingFang SC, sans-serif';
    ctx.fillStyle = '#a855f7';
    ctx.textAlign = 'left';
    ctx.fillText('\ud83c\udfa4 核心维度', 60, y);
    y += 15;

    // 维度条
    const dn = {
      krypton:'\u6c2a\u91d1\u529b', data:'\u6570\u636e\u529b', face:'\u989c\u63a7\u5ea6', mom:'\u5988\u7c89\u503c', gf:'\u604b\u7231\u8111',
      toxic:'\u6bd2\u552f\u5ea6', chill:'\u4f5b\u7cfb\u5ea6', climb:'\u722c\u5899\u7387', shill:'\u5b89\u5229\u6b32', antihate:'\u53cd\u9ed1\u529b',
      ctrl:'\u63a7\u8bc4\u529b', front:'\u524d\u7ebf\u529b', drama:'\u620f\u7cbe\u503c', emo:'emo\u503c', sane:'\u7406\u667a\u503c', loyal:'\u5fe0\u8bda\u5ea6'
    };
    const dc = {
      krypton:'#ffd93d', data:'#38bdf8', face:'#ff6bcd', mom:'#6bcb77', gf:'#ff6b6b',
      toxic:'#9333ea', chill:'#94a3b8', climb:'#f97316', shill:'#22d3ee', antihate:'#ef4444',
      ctrl:'#3b82f6', front:'#a855f7', drama:'#ec4899', emo:'#60a5fa', sane:'#10b981', loyal:'#f59e0b'
    };
    const allDims = Object.keys(dn);
    const dimVals = allDims.map(d => ({key:d, val: Math.min(99, Math.max(5, Math.round((scores[d]||0)/20*100+Math.random()*12)))}));
    dimVals.sort((a,b) => b.val - a.val);
    const top6 = dimVals.slice(0, 6);

    top6.forEach(d => {
      y += 34;
      ctx.font = '18px -apple-system, PingFang SC, sans-serif';
      ctx.fillStyle = '#888'; ctx.textAlign = 'left';
      ctx.fillText(dn[d.key], 60, y);
      ctx.fillStyle = '#1a1a2e';
      roundRect(ctx, 165, y-13, 400, 16, 8); ctx.fill();
      ctx.fillStyle = dc[d.key] || '#a855f7';
      roundRect(ctx, 165, y-13, 400*(d.val/100), 16, 8); ctx.fill();
      ctx.fillStyle = '#a855f7'; ctx.textAlign = 'right';
      ctx.fillText(d.val+'%', 620, y);
    });

    y += 45; // 维度条后间距
    return y; // 返回底部内容起始Y
  }

  const contentEndY = drawContent();

  // 计算底部区域需要的高度：logo(30) + gap(20) + text(16) + gap(15) + qr背景(130) + gap(30) + text(18) + gap(25) + text(14) + padding(25) ≈ 325
  const bottomNeeded = 310;
  const totalH = Math.max(1334, contentEndY + bottomNeeded);

  // 重设画布到精确高度并重绘
  canvas.height = totalH;
  const contentY2 = drawContent();

  // 底部：logo + 二维码
  const qrImg = new Image();
  const logoImg = new Image();
  let loaded = 0;
  function onBothLoaded() {
    loaded++;
    if (loaded < 2) return;
    const qrSize = 100;
    const logoH = 28;
    const logoW = logoH * (logoImg.naturalWidth / logoImg.naturalHeight);
    let by = contentY2;

    // QQ音乐logo
    ctx.drawImage(logoImg, W/2 - logoW/2, by, logoW, logoH);
    by += logoH + 18;
    ctx.textAlign = 'center';
    ctx.font = '15px -apple-system, PingFang SC, sans-serif';
    ctx.fillStyle = '#888';
    ctx.fillText('QQ\u97f3\u4e50 \u51fa\u54c1', W/2, by);
    by += 22;

    // 二维码
    const qrX = W/2 - qrSize/2;
    ctx.fillStyle = '#fff';
    roundRect(ctx, qrX-8, by-8, qrSize+16, qrSize+16, 8); ctx.fill();
    ctx.drawImage(qrImg, qrX, by, qrSize, qrSize);
    by += qrSize + 28;

    ctx.font = '17px -apple-system, PingFang SC, sans-serif';
    ctx.fillStyle = '#aaa';
    ctx.fillText('\u626b\u7801\u6d4b\u6d4b\u4f60\u662f\u54ea\u79cd\u8ffd\u661f\u602a\u7269', W/2, by);
    by += 28;
    ctx.font = '13px -apple-system, PingFang SC, sans-serif';
    ctx.fillStyle = '#555';
    ctx.fillText('FSTI \u00b7 \u8ffd\u661f\u7075\u9b42\u4eba\u683c\u6307\u793a\u5668 \u00b7 \u4ec5\u4f9b\u5a31\u4e50', W/2, by);

    document.getElementById('poster-overlay').classList.add('show');
  }
  qrImg.onload = onBothLoaded;
  logoImg.onload = onBothLoaded;
  qrImg.src = QR_SRC;
  logoImg.src = LOGO_SRC;
}

// 文字换行工具
function wrapText(ctx, text, x, y, maxW, lineH) {
  const align = ctx.textAlign;
  let line = '';
  for(let i=0; i<text.length; i++){
    const test = line + text[i];
    if(ctx.measureText(test).width > maxW && line){
      ctx.fillText(line, x, y);
      line = text[i]; y += lineH;
    } else { line = test; }
  }
  if(line) { ctx.fillText(line, x, y); y += lineH; }
  return y;
}

// 圆角矩形
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}
