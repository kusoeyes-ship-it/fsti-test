<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTI 追星灵魂人格测试 | 你是哪种追星人格？</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, 'PingFang SC', sans-serif;
  background: #050508; color: #e8e8e8;
  min-height: 100vh; overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* 背景 */
.stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #050508; z-index: -1; }
.star { position: absolute; border-radius: 50%; background: #fff;
  animation: twinkle 3s ease-in-out infinite alternate; }
@keyframes twinkle { 0%{opacity:0.05} 100%{opacity:0.4} }

.container { max-width: 640px; margin: 0 auto; padding: 24px 28px; }

/* 页面切换 */
.page { display: none; }
.page.active { display: block; }

/* === 首页：瑞士国际主义 === */
.title-section { padding: 80px 0 32px; }
.title-section h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 96px; font-weight: 400;
  color: #a855f7;
  margin-bottom: 0; line-height: 1;
  animation: glowPulse 3s ease-in-out infinite alternate;
}
@keyframes glowPulse {
  0%{ text-shadow: 0 0 20px rgba(168,85,247,0.2); }
  100%{ text-shadow: 0 0 40px rgba(168,85,247,0.5), 0 0 80px rgba(168,85,247,0.15); }
}
.title-section .sub-en {
  font-size: 11px; font-weight: 600; letter-spacing: 6px; text-transform: uppercase;
  color: rgba(168,85,247,0.5); margin-top: 8px;
}
.title-section .tagline {
  font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.45);
  margin-top: 48px; letter-spacing: 1px; line-height: 1.8;
}
.title-section .tagline em {
  font-style: normal; color: rgba(168,85,247,0.7); font-weight: 400;
}
.title-section .hero-line {
  font-size: 28px; font-weight: 800; color: #fff;
  margin-top: 20px; line-height: 1.5; letter-spacing: -0.5px;
}
.title-section .hero-line span { color: #a855f7; }

/* 分割线 */
.divider { width: 40px; height: 2px; background: rgba(168,85,247,0.4); margin: 32px 0; }

.disclaimer {
  font-size: 12px; font-weight: 400; color: rgba(255,255,255,0.4);
  line-height: 2; margin: 24px 0; border-left: 2px solid rgba(168,85,247,0.2); padding-left: 16px;
}

.start-btn {
  display: block; width: 100%; max-width: 360px; margin: 40px 0;
  padding: 18px 0; font-size: 14px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
  background: transparent; color: #a855f7;
  border: 1.5px solid rgba(168,85,247,0.4); border-radius: 0;
  cursor: pointer; transition: all 0.4s;
}
.start-btn:hover { background: #a855f7; color: #050508; border-color: #a855f7; }

.footer-note {
  font-size: 11px; font-weight: 400; color: rgba(255,255,255,0.25);
  margin: 40px 0 20px; letter-spacing: 1px;
}

/* === 测试题：网格系统 === */
.progress-bar { height: 1px; background: rgba(255,255,255,0.06); margin: 24px 0 8px; }
.progress-fill { height: 100%; background: #a855f7; transition: width 0.5s; }
.progress-text { color: rgba(255,255,255,0.35); font-size: 12px; font-weight: 600;
  letter-spacing: 4px; margin-bottom: 32px; }
.question-card {
  background: transparent; border: none; border-left: 2px solid rgba(168,85,247,0.3);
  padding: 0 0 0 24px; margin: 0; animation: fadeIn 0.4s;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.question-text {
  font-size: 20px; font-weight: 500; margin-bottom: 32px;
  line-height: 1.8; color: #fff; letter-spacing: 0.3px;
}
.option {
  display: block; width: 100%; padding: 16px 20px; margin: 8px 0;
  background: transparent; border: 1px solid rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.7); font-size: 15px; font-weight: 400;
  text-align: left; cursor: pointer; transition: all 0.3s; line-height: 1.6;
  border-radius: 0;
}
.option:hover { border-color: rgba(168,85,247,0.5); color: #fff; padding-left: 28px; }
.option.selected { border-color: #a855f7; color: #fff; background: rgba(168,85,247,0.06); }
.nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; }
.prev-btn {
  padding: 8px 20px; font-size: 11px; font-weight: 600; letter-spacing: 2px;
  color: rgba(255,255,255,0.2); background: transparent;
  border: 1px solid rgba(255,255,255,0.08); cursor: pointer; transition: all 0.3s;
}
.prev-btn:hover { border-color: rgba(168,85,247,0.4); color: #a855f7; }
.prev-btn:disabled { opacity: 0.15; cursor: not-allowed; }
.nav-hint { font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 1px; }

/* === 结果页 === */
.result-card {
  text-align: left; padding: 0; background: transparent; border: none; margin: 24px 0;
}
.result-emoji { font-size: 72px; margin-bottom: 16px; text-align: center; }
.result-code {
  font-family: 'Inter'; font-size: 11px; font-weight: 600; letter-spacing: 6px;
  color: rgba(168,85,247,0.6); text-transform: uppercase;
}
.result-name {
  font-size: 36px; font-weight: 800; color: #fff; margin: 4px 0 8px;
  letter-spacing: -0.5px; line-height: 1.2;
}
.result-match {
  font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.35);
  margin-bottom: 24px; letter-spacing: 1px;
}
.result-tagline {
  font-size: 18px; font-weight: 400; color: rgba(255,255,255,0.8);
  margin: 0 0 24px; line-height: 1.7; font-style: italic;
  border-left: 2px solid rgba(168,85,247,0.3); padding-left: 16px;
}
.result-desc {
  font-size: 15px; font-weight: 400; line-height: 2.2; color: rgba(255,255,255,0.6);
  padding: 0; background: transparent; margin: 0 0 32px;
}
.result-desc strong { color: #a855f7; font-weight: 600; }
.dims-section { margin: 0 0 32px; }
.dims-section h3 {
  font-size: 10px; font-weight: 600; letter-spacing: 4px; color: rgba(168,85,247,0.5);
  text-transform: uppercase; margin-bottom: 20px;
}
.dim-row { display: flex; align-items: center; margin: 10px 0; font-size: 12px; }
.dim-label { width: 72px; color: rgba(255,255,255,0.5); flex-shrink: 0; font-weight: 400; font-size: 12px; }
.dim-bar { flex: 1; height: 2px; background: rgba(255,255,255,0.04); margin: 0 12px; }
.dim-fill { height: 100%; background: #a855f7; transition: width 1.2s; }
.dim-val { width: 36px; text-align: right; color: rgba(168,85,247,0.6); flex-shrink: 0;
  font-size: 11px; font-weight: 600; }

/* 按钮组 */
.result-actions { display: flex; flex-wrap: wrap; gap: 8px; margin: 32px 0; }
.retry-btn, .poster-btn, .share-btn {
  display: inline-block; padding: 14px 28px; margin: 0;
  font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
  background: transparent; border: 1px solid rgba(168,85,247,0.3); color: #a855f7;
  border-radius: 0; cursor: pointer; transition: all 0.3s;
}
.retry-btn:hover, .poster-btn:hover, .share-btn:hover {
  background: #a855f7; color: #050508; border-color: #a855f7;
}

/* 二维码区 */
.qr-section {
  margin: 32px 0; padding: 24px 0; border-top: 1px solid rgba(255,255,255,0.04);
  display: flex; align-items: center; gap: 20px; max-width: 100%; text-align: left;
  background: transparent; border-radius: 0;
}
.qr-section img { width: 80px; height: 80px; border-radius: 0; margin: 0; flex-shrink: 0; }
.qr-section .qr-text { font-size: 12px; color: rgba(255,255,255,0.4); line-height: 1.8; font-weight: 400; }

/* 海报弹窗 */
.poster-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.92); z-index: 9999;
  justify-content: center; align-items: center; flex-direction: column;
}
.poster-overlay.show { display: flex; }
.poster-overlay canvas { max-width: 90vw; max-height: 75vh; }
.poster-actions { margin-top: 20px; display: flex; gap: 12px; }
.poster-actions button {
  padding: 12px 28px; font-size: 11px; font-weight: 600; letter-spacing: 2px;
  cursor: pointer; transition: all 0.3s; border-radius: 0;
}
.poster-save { background: #a855f7; border: none; color: #050508; }
.poster-close { background: transparent; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.4); }
.poster-save:hover { background: #c084fc; }
.poster-close:hover { border-color: #fff; color: #fff; }

.brand-logo { display: block; margin: 20px 0 5px; height: 24px; opacity: 0.4; }
.brand-text { color: rgba(255,255,255,0.1); font-size: 10px; margin-bottom: 10px; }

/* 底部镂空水印 */
.fsti-watermark {
  position: fixed; bottom: 16px; left: 0; width: 100%; text-align: center;
  font-family: 'Great Vibes', cursive; font-size: 80px;
  color: transparent;
  -webkit-text-stroke: 1px rgba(168,85,247,0.12);
  animation: wmBreath 4s ease-in-out infinite, wmFlow 6s linear infinite;
  pointer-events: none; z-index: 999; user-select: none;
}
@keyframes wmBreath {
  0%{ -webkit-text-stroke-color: rgba(168,85,247,0.08); }
  50%{ -webkit-text-stroke-color: rgba(168,85,247,0.2); }
  100%{ -webkit-text-stroke-color: rgba(168,85,247,0.08); }
}
@keyframes wmFlow {
  0%{ filter: drop-shadow(0 0 6px rgba(168,85,247,0)); }
  25%{ filter: drop-shadow(3px 0 15px rgba(168,85,247,0.15)); }
  50%{ filter: drop-shadow(0 0 6px rgba(168,85,247,0)); }
  75%{ filter: drop-shadow(-3px 0 15px rgba(168,85,247,0.1)); }
  100%{ filter: drop-shadow(0 0 6px rgba(168,85,247,0)); }
}
</style>
</head>

// ========== 测试逻辑 ==========
let currentQ = 0;
let answers = [];

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function calcScores() {
  const s = {};
  answers.forEach((ans, qi) => {
    if (ans >= 0 && questions[qi]) {
      const opt = questions[qi].opts[ans];
      for (let k in opt.scores) { s[k] = (s[k] || 0) + opt.scores[k]; }
    }
  });
  return s;
}

function startTest() {
  currentQ = 0;
  answers = new Array(questions.length).fill(-1);
  showPage('page-test');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const area = document.getElementById('question-area');
  document.getElementById('progress').style.width = ((currentQ+1)/questions.length*100)+'%';
  document.getElementById('progress-text').textContent = `${currentQ+1} / ${questions.length}`;
  const prev = answers[currentQ];
  let html = `<div class="question-card"><div class="question-text">${q.q}</div>`;
  q.opts.forEach((o,i) => {
    html += `<button class="option${i===prev?' selected':''}" data-idx="${i}">${o.text}</button>`;
  });
  html += `<div class="nav-row"><button class="prev-btn" id="btn-prev" ${currentQ===0?'disabled':''}>⬅ 上一题</button><span class="nav-hint">点选项前进 · 可回退修改</span></div></div>`;
  area.innerHTML = html;
  area.querySelectorAll('.option').forEach(b => {
    b.addEventListener('click', function(){ selectOption(parseInt(this.dataset.idx)); });
  });
  const pb = document.getElementById('btn-prev');
  if(pb && currentQ>0) pb.addEventListener('click', goPrev);
}

function selectOption(idx) {
  answers[currentQ] = idx;
  currentQ++;
  if(currentQ < questions.length) renderQuestion(); else showResult();
}

function goPrev() { if(currentQ>0){ currentQ--; renderQuestion(); } }

function showResult() {
  const scores = calcScores();
  let best = null, bestS = -1;
  results.forEach(r => {
    let s=0, m=0;
    for(let k in r.dims){ s += (scores[k]||0)*(r.dims[k]/100); m += 20*(r.dims[k]/100); }
    const pct = Math.min(99, Math.round(55+(s/Math.max(m,1))*44));
    if(s > bestS){ bestS=s; best={...r, matchPct:pct}; }
  });
  const r = best;

    krypton:'应援力', data:'数据力', face:'颜控度', mom:'妈粉值', gf:'心动值',

// ========== Canvas 海报生成 ==========
function generatePoster(r, scores, dimsHtml) {
  const avatarImg = new Image();
  avatarImg.src = AVATAR_MAP[r.code] || '';
  avatarImg.onload = function() { doDrawPoster(r, scores, avatarImg); };
  avatarImg.onerror = function() { doDrawPoster(r, scores, null); };
}

function doDrawPoster(r, scores, avatarImg) {
  const W = 750, H = 1334;
  const canvas = document.getElementById('poster-canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  const P = '#a855f7';

  // 纯黑背景
  ctx.fillStyle = '#050508'; ctx.fillRect(0, 0, W, H);
  const glow = ctx.createRadialGradient(W/2, 300, 0, W/2, 300, 350);
  glow.addColorStop(0, 'rgba(120,50,200,0.05)'); glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow; ctx.fillRect(0, 0, W, H);

  // === 顶部 ===
  ctx.textAlign='center';
  ctx.font='600 11px Inter,-apple-system,PingFang SC,sans-serif'; ctx.fillStyle='rgba(168,85,247,0.5)';
  ctx.letterSpacing = '4px';
  ctx.fillText('FSTI \u00b7 FANDOM SOUL TYPE INDICATOR', W/2, 36);

  // === 头像 ===
  if(avatarImg){
    const aS=160, aY=56;
    ctx.beginPath();ctx.arc(W/2,aY+aS/2,aS/2+3,0,Math.PI*2);ctx.strokeStyle='rgba(168,85,247,0.2)';ctx.lineWidth=1;ctx.stroke();
    ctx.save();ctx.beginPath();ctx.arc(W/2,aY+aS/2,aS/2,0,Math.PI*2);ctx.clip();ctx.drawImage(avatarImg,W/2-aS/2,aY,aS,aS);ctx.restore();
  }

  let y = 250;

  // === 人格信息 ===
  ctx.textAlign='center';
  ctx.font='600 12px Inter,-apple-system,PingFang SC,sans-serif'; ctx.fillStyle='rgba(168,85,247,0.5)';
  ctx.fillText(r.code, W/2, y); y+=30;

  ctx.font='800 38px Inter,-apple-system,PingFang SC,sans-serif'; ctx.fillStyle='#fff';
  ctx.fillText(r.name, W/2, y); y+=26;

  ctx.font='400 14px Inter,-apple-system,PingFang SC,sans-serif'; ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.fillText('\u5339\u914d\u5ea6 '+r.matchPct+'%', W/2, y); y+=24;

  // 分隔线
  ctx.strokeStyle='rgba(168,85,247,0.15)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(100,y); ctx.lineTo(W-100,y); ctx.stroke(); y+=22;

  // tagline
  ctx.font='400 20px Inter,-apple-system,PingFang SC,sans-serif'; ctx.fillStyle='rgba(255,255,255,0.75)';
  y=wrapText(ctx, r.tagline.replace(/'/g,''), W/2, y, W-120, 28); y+=16;

  // 描述（紧凑）
  ctx.font='400 16px Inter,-apple-system,PingFang SC,sans-serif'; ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.textAlign='left';
  y=wrapText(ctx, r.desc.replace(/<[^>]+>/g,''), 50, y, W-100, 24); y+=28;

  // === 六维雷达图 + 粉丝画像标签 ===
  const dn={krypton:'\u5e94\u63f4',data:'\u6570\u636e',face:'\u989c\u63a7',mom:'\u5173\u7231',gf:'\u5fc3\u52a8',toxic:'\u4e13\u4e00',chill:'\u6de1\u5b9a',climb:'\u63a2\u7d22',shill:'\u5b89\u5229',antihate:'\u5b88\u62a4',ctrl:'\u7ec4\u7ec7',front:'\u524d\u7ebf',drama:'\u8868\u8fbe',emo:'\u60c5\u611f',sane:'\u7406\u667a',loyal:'\u5fe0\u8bda'};
  const allDims=Object.keys(dn);
  const dimVals=allDims.map(d=>({k:d,v:Math.min(99,Math.max(5,Math.round((scores[d]||0)/20*100+Math.random()*12)))})).sort((a,b)=>b.v-a.v);
  const top6=dimVals.slice(0,6);

  // 雷达图参数
  const cx=W/2, cy=y+120, radius=90;
  const sides=6;
  const angleStep=Math.PI*2/sides;
  const startAngle=-Math.PI/2;

  // 画雷达网格（3层）
  for(let layer=1;layer<=3;layer++){
    const lr=radius*layer/3;
    ctx.beginPath();
    for(let i=0;i<sides;i++){
      const a=startAngle+i*angleStep;
      const px=cx+Math.cos(a)*lr, py=cy+Math.sin(a)*lr;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.closePath();
    ctx.strokeStyle='rgba(168,85,247,'+(0.06+layer*0.03)+')'; ctx.lineWidth=1; ctx.stroke();
  }

  // 画轴线
  for(let i=0;i<sides;i++){
    const a=startAngle+i*angleStep;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(a)*radius, cy+Math.sin(a)*radius);
    ctx.strokeStyle='rgba(168,85,247,0.08)'; ctx.lineWidth=1; ctx.stroke();
  }

  // 画数据区域
  ctx.beginPath();
  for(let i=0;i<sides;i++){
    const a=startAngle+i*angleStep;
    const r2=radius*top6[i].v/100;
    const px=cx+Math.cos(a)*r2, py=cy+Math.sin(a)*r2;
    if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.closePath();
  ctx.fillStyle='rgba(168,85,247,0.15)'; ctx.fill();
  ctx.strokeStyle='rgba(168,85,247,0.6)'; ctx.lineWidth=2; ctx.stroke();

  // 画顶点圆点
  for(let i=0;i<sides;i++){
    const a=startAngle+i*angleStep;
    const r2=radius*top6[i].v/100;
    ctx.beginPath();
    ctx.arc(cx+Math.cos(a)*r2, cy+Math.sin(a)*r2, 3, 0, Math.PI*2);
    ctx.fillStyle=P; ctx.fill();
  }

  // 维度标签（雷达外侧）
  ctx.font='400 13px Inter,-apple-system,PingFang SC,sans-serif';
  for(let i=0;i<sides;i++){
    const a=startAngle+i*angleStep;
    const lx=cx+Math.cos(a)*(radius+28), ly=cy+Math.sin(a)*(radius+28);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillText(dn[top6[i].k], lx, ly);
  }

  // === 粉丝画像标签（雷达图下方） ===
  const tagY = cy + radius + 56;
  const tags = top6.slice(0,4).map(d=>dn[d.k]+'\u578b');
  // 居中排列标签
  ctx.font='500 13px Inter,-apple-system,PingFang SC,sans-serif';
  const tagW=80, tagH=30, tagGap=10;
  const totalTagW=tags.length*tagW+(tags.length-1)*tagGap;
  let tagX=(W-totalTagW)/2;
  tags.forEach(t=>{
    // 标签背景
    roundRect(ctx, tagX, tagY, tagW, tagH, 0);
    ctx.fillStyle='rgba(168,85,247,0.1)'; ctx.fill();
    ctx.strokeStyle='rgba(168,85,247,0.25)'; ctx.lineWidth=1; ctx.stroke();
    // 标签文字
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(168,85,247,0.8)';
    ctx.fillText(t, tagX+tagW/2, tagY+tagH/2);
    tagX+=tagW+tagGap;
  });

  // === 底部：左文案+右二维码 ===
  const qrImg=new Image(),logoImg=new Image(); let ld=0;
  function done(){ld++;if(ld<2)return;
    const by=H-165;
    ctx.strokeStyle='rgba(168,85,247,0.1)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(50,by); ctx.lineTo(W-50,by); ctx.stroke();
    const qS=95, qX=W-50-qS, qY=by+12;
    ctx.fillStyle='#fff'; roundRect(ctx,qX-5,qY-5,qS+10,qS+10,0); ctx.fill();
    ctx.drawImage(qrImg,qX,qY,qS,qS);
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    ctx.font='600 20px Inter,-apple-system,PingFang SC,sans-serif'; ctx.fillStyle='#fff';
    ctx.fillText('\u8ffd\u661f\u4eba\u683c\u9274\u5b9a', 50, qY+26);
    ctx.font='400 13px Inter,-apple-system,PingFang SC,sans-serif'; ctx.fillStyle='rgba(255,255,255,0.35)';
    ctx.fillText('\u626b\u7801\u6216\u957f\u6309\u8bc6\u522b\u5f00\u59cb\u6d4b\u8bd5', 50, qY+48);
    const lH=20, lW=lH*(logoImg.naturalWidth/logoImg.naturalHeight);
    ctx.drawImage(logoImg, 50, qY+62, lW, lH);
    ctx.textAlign='center'; ctx.font='400 11px Inter,-apple-system,PingFang SC,sans-serif'; ctx.fillStyle='rgba(255,255,255,0.12)';
    ctx.fillText('FSTI \u00b7 \u4ec5\u4f9b\u5a31\u4e50', W/2, H-10);
    document.getElementById('poster-overlay').classList.add('show');
  }
  qrImg.onload=done; logoImg.onload=done; qrImg.src=QR_SRC; logoImg.src=LOGO_SRC;
}

// 文字换行工具
function wrapText(ctx, text, x, y, maxW, lineH) {
  const align = ctx.textAlign;
  let line = '';
  for(let i=0; i<text.length; i++){
    const test = line + text[i];
    if(ctx.measureText(test).width > maxW && line){
      ctx.fillText(line, x, y);
      line = text[i]; y += lineH;
    } else { line = test; }
  }
  if(line) { ctx.fillText(line, x, y); y += lineH; }
  return y;
}

// 圆角矩形
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// ========== 初始化 ==========
document.getElementById('btn-start').addEventListener('click', startTest);

// 海报弹窗控制
document.getElementById('btn-poster-close').addEventListener('click', function(){
  document.getElementById('poster-overlay').classList.remove('show');
});
document.getElementById('btn-poster-save').addEventListener('click', function(){
  const canvas = document.getElementById('poster-canvas');
  const link = document.createElement('a');
  link.download = 'FSTI-我的追星人格.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});
</script>
